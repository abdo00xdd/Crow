{% extends 'base.html' %}

{% block title %}{{ room.name }} - Video Call | Crow{% endblock %}

{% block extra_css %}
<style>
    body { margin: 0; overflow: hidden; background: #000; }
    
    .video-room {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #1a1a1a;
    }
    
    .room-header {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0,0,0,0.8);
        padding: 16px 24px;
        border-radius: 12px;
        color: white;
        z-index: 10;
    }
    
    #videoGrid {
        flex: 1;
        display: grid;
        gap: 10px;
        padding: 10px;
    }
    
    .video-container {
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        position: relative;
    }
    
    .control-bar {
        background: rgba(0,0,0,0.9);
        padding: 24px;
        display: flex;
        justify-content: center;
        gap: 16px;
    }
    
    .control-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: none;
        background: rgba(255,255,255,0.1);
        color: white;
        font-size: 20px;
        cursor: pointer;
    }
    
    .control-btn:hover { background: rgba(255,255,255,0.2); }
    .control-btn.active { background: #2563eb; }
    .control-btn.danger { background: #dc2626; }
</style>
{% endblock %}

{% block content %}
<div class="video-room">
    <div class="room-header">
        <h2>{{ room.name }}</h2>
        <p><span id="count">1</span> participant(s)</p>
    </div>
    
    <div id="videoGrid"></div>
    
    <div class="control-bar">
        <button class="control-btn active" id="videoBtn" onclick="toggleVideo()">📹</button>
        <button class="control-btn active" id="audioBtn" onclick="toggleAudio()">🎤</button>
        <button class="control-btn" id="screenBtn" onclick="shareScreen()">🖥️</button>
        <button class="control-btn danger" onclick="leave()">📞</button>
    </div>
</div>

<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.19.1.js"></script>
<script>
// CHANGE THIS TO YOUR AGORA APP ID
const APP_ID = 'c0943531bf7f4a0e919bce9c56d3aed1';

const CHANNEL = '{{ room_id }}';
const UID = {{ user.id }};

let client = AgoraRTC.createClient({mode: 'rtc', codec: 'vp8'});
let localVideo = null;
let localAudio = null;
let videoOn = true;
let audioOn = true;

// Join channel
async function join() {
    await client.join(APP_ID, CHANNEL, null, UID);
    
    localVideo = await AgoraRTC.createCameraVideoTrack();
    localAudio = await AgoraRTC.createMicrophoneAudioTrack();
    
    await client.publish([localVideo, localAudio]);
    
    // Show local video
    const div = document.createElement('div');
    div.className = 'video-container';
    div.id = 'local';
    document.getElementById('videoGrid').appendChild(div);
    localVideo.play(div);
    
    updateGrid();
}

// Handle remote users
client.on('user-published', async (user, mediaType) => {
    await client.subscribe(user, mediaType);
    
    if (mediaType === 'video') {
        let div = document.getElementById('remote-' + user.uid);
        if (!div) {
            div = document.createElement('div');
            div.className = 'video-container';
            div.id = 'remote-' + user.uid;
            document.getElementById('videoGrid').appendChild(div);
        }
        user.videoTrack.play(div);
        updateGrid();
    }
    
    if (mediaType === 'audio') {
        user.audioTrack.play();
    }
});

client.on('user-unpublished', (user) => {
    const div = document.getElementById('remote-' + user.uid);
    if (div) div.remove();
    updateGrid();
});

function updateGrid() {
    const count = document.querySelectorAll('.video-container').length;
    document.getElementById('count').textContent = count;
    
    const grid = document.getElementById('videoGrid');
    if (count === 1) grid.style.gridTemplateColumns = '1fr';
    else if (count === 2) grid.style.gridTemplateColumns = 'repeat(2, 1fr)';
    else grid.style.gridTemplateColumns = 'repeat(3, 1fr)';
}

async function toggleVideo() {
    videoOn = !videoOn;
    await localVideo.setEnabled(videoOn);
    document.getElementById('videoBtn').classList.toggle('active', videoOn);
}

async function toggleAudio() {
    audioOn = !audioOn;
    await localAudio.setEnabled(audioOn);
    document.getElementById('audioBtn').classList.toggle('active', audioOn);
}

async function shareScreen() {
    try {
        const screen = await AgoraRTC.createScreenVideoTrack();
        await client.unpublish([localVideo]);
        await client.publish([screen]);
        
        const div = document.getElementById('local');
        div.innerHTML = '';
        screen.play(div);
        
        screen.on('track-ended', async () => {
            await client.unpublish([screen]);
            await client.publish([localVideo]);
            div.innerHTML = '';
            localVideo.play(div);
        });
    } catch (e) {
        alert('Screen share failed: ' + e.message);
    }
}

async function leave() {
    if (confirm('Leave call?')) {
        localVideo.close();
        localAudio.close();
        await client.leave();
        window.location.href = '/';
    }
}

// Auto join
join().catch(e => alert('Failed to join: ' + e.message));
</script>
{% endblock %}
